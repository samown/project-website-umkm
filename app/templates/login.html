<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Admin — Toko Rini</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Plus Jakarta Sans',sans-serif;}</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-orange-600 via-amber-500 to-yellow-400 flex items-center justify-center p-4">

  <div class="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-2">🛒</div>
      <h1 style="font-family:'Playfair Display',serif" class="text-2xl font-bold text-gray-800">
        Toko Rini
      </h1>
      <p class="text-sm text-gray-500 mt-1">Panel Admin</p>
    </div>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl mb-5">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5">Username</label>
        <input name="username" type="text" required autocomplete="username"
               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300 transition"
               placeholder="Masukkan username"/>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5">Password</label>
        <input name="password" type="password" required autocomplete="current-password"
               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300 transition"
               placeholder="Masukkan password"/>
      </div>
      <button type="submit"
              class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-xl transition mt-2">
        Masuk
      </button>
    </form>

    <p class="text-center text-xs text-gray-400 mt-6">
      <a href="{{ url_for('public.index') }}" class="hover:text-orange-500 transition">
        ← Kembali ke toko
      </a>
    </p>
  </div>

</body>
</html>
