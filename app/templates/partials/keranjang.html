<!-- ═══════════════ KERANJANG BELANJA (Alpine.js) ═══════════════ -->
<div x-data="cart()" x-init="loadCart()">
  <!-- Tombol keranjang mengambang -->
  <button @click="open = true"
          class="fixed bottom-6 right-6 z-50 bg-orange-500 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center hover:bg-orange-600 transition"
          x-show="items.length > 0">
    <span class="text-2xl">🛒</span>
    <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold"
          x-text="totalQty()"></span>
  </button>

  <!-- Panel Keranjang (Slide-over) -->
  <div x-show="open" x-transition:enter="transition ease-out duration-200"
       class="fixed inset-0 z-50 flex justify-end" style="display:none">
    <!-- Backdrop -->
    <div @click="open = false" class="absolute inset-0 bg-black/40"></div>

    <!-- Drawer -->
    <div class="relative w-full max-w-sm bg-white h-full shadow-2xl flex flex-col">
      <div class="flex items-center justify-between px-5 py-4 border-b">
        <h2 class="font-display text-lg font-bold text-gray-800">🛒 Keranjang Saya</h2>
        <button @click="open = false" class="text-gray-400 hover:text-gray-700">✕</button>
      </div>

      <!-- Daftar item -->
      <div class="flex-1 overflow-y-auto px-5 py-4 space-y-3">
        <template x-for="item in items" :key="item.id">
          <div class="flex items-center gap-3 bg-orange-50 p-3 rounded-xl">
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold text-gray-800 truncate" x-text="item.name"></p>
              <p class="text-xs text-orange-600 font-medium"
                 x-text="'Rp' + item.price.toLocaleString('id-ID')"></p>
            </div>
            <div class="flex items-center gap-1">
              <button @click="dec(item.id)" class="w-7 h-7 bg-white border rounded-lg text-sm font-bold hover:bg-orange-100">−</button>
              <span class="w-6 text-center text-sm font-semibold" x-text="item.qty"></span>
              <button @click="inc(item.id)" class="w-7 h-7 bg-white border rounded-lg text-sm font-bold hover:bg-orange-100">+</button>
            </div>
          </div>
        </template>
        <p x-show="items.length === 0" class="text-center text-gray-400 text-sm pt-8">
          Keranjang kosong
        </p>
      </div>

      <!-- Total & Checkout -->
      <div class="border-t px-5 py-4 space-y-3">
        <div class="flex justify-between text-sm font-semibold">
          <span>Total</span>
          <span class="text-orange-600" x-text="'Rp' + totalPrice().toLocaleString('id-ID')"></span>
        </div>
        <button @click="showCheckout = true"
                x-show="items.length > 0"
                class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-xl transition">
          Lanjut Checkout →
        </button>
      </div>

      <!-- Form Checkout -->
      <div x-show="showCheckout" x-transition
           class="absolute inset-0 bg-white flex flex-col" style="display:none">
        <div class="flex items-center gap-3 px-5 py-4 border-b">
          <button @click="showCheckout = false" class="text-gray-400 hover:text-gray-700">←</button>
          <h2 class="font-display text-lg font-bold text-gray-800">Detail Pesanan</h2>
        </div>
        <div class="flex-1 overflow-y-auto px-5 py-4 space-y-3">
          <input x-model="form.name" placeholder="Nama lengkap *"
                 class="w-full border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300"/>
          <input x-model="form.phone" placeholder="No. HP / WA *" type="tel"
                 class="w-full border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300"/>
          <textarea x-model="form.address" placeholder="Alamat pengiriman *" rows="3"
                    class="w-full border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300 resize-none"></textarea>
          <textarea x-model="form.notes" placeholder="Catatan (opsional)" rows="2"
                    class="w-full border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300 resize-none"></textarea>
          <p x-show="checkoutError" x-text="checkoutError"
             class="text-red-600 text-xs bg-red-50 px-3 py-2 rounded-lg"></p>
        </div>
        <div class="border-t px-5 py-4">
          <button @click="doCheckout()" :disabled="loading"
                  class="w-full bg-green-500 hover:bg-green-600 disabled:opacity-60 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2">
            <span x-show="!loading">📲 Pesan via WhatsApp</span>
            <span x-show="loading">Memproses...</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
