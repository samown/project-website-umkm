<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Login — Toko Rini</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white p-8 rounded shadow">
      <h1 class="text-2xl font-semibold mb-4">Admin Login</h1>

      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div>
        {% for category, msg in messages %}
        <div
          class="mb-3 p-3 rounded {{ 'bg-red-100 text-red-800' if category == 'error' else 'bg-green-100 text-green-800' }}"
        >
          {{ msg }}
        </div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %}

      <form
        action="{{ url_for('auth.admin_login_post') }}"
        method="post"
        class="space-y-4"
      >
        <div>
          <label class="block text-sm font-medium text-gray-700"
            >Username</label
          >
          <input
            name="username"
            type="text"
            required
            class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700"
            >Password</label
          >
          <input
            name="password"
            type="password"
            required
            class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
          />
        </div>
        <div>
          <button
            type="submit"
            class="w-full inline-flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700"
          >
            Login
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
