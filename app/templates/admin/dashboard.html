{% extends 'base.html' %}

{% block title %}Dashboard Admin{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 py-10">
  <div class="rounded-3xl border border-orange-100 bg-white p-8 shadow-sm">
    <div class="flex flex-col gap-6 md:flex-row md:items-center md:justify-between">
      <div>
        <h1 class="text-3xl font-semibold text-orange-700">Admin Dashboard</h1>
        <p class="mt-2 text-gray-600">Selamat datang, admin. Gunakan panel ini untuk mengelola produk toko.</p>
      </div>
      <div class="flex flex-wrap gap-3">
        <a href="{{ url_for('admin.product_list') }}" class="rounded-full bg-orange-600 px-5 py-3 text-sm font-semibold text-white hover:bg-orange-700 transition">Kelola Produk</a>
        <a href="{{ url_for('auth.admin_logout') }}" class="rounded-full border border-orange-200 bg-white px-5 py-3 text-sm font-semibold text-orange-700 hover:bg-orange-50 transition">Logout</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
