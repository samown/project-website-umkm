{% extends 'base.html' %}

{% block title %}Tambah Produk Baru{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-10">
  <div class="mb-8">
    <a href="{{ url_for('admin.product_list') }}" class="text-orange-700 hover:text-orange-900">← Kembali ke daftar produk</a>
    <h1 class="mt-4 text-3xl font-semibold text-orange-700">Tambah Produk Baru</h1>
    <p class="mt-2 text-gray-600">Isi data produk dan unggah gambar dalam format JPG/PNG.</p>
  </div>

  <div class="rounded-3xl border border-orange-100 bg-white p-8 shadow-sm">
    <form action="" method="post" enctype="multipart/form-data" class="space-y-6">
      <div class="grid gap-6 md:grid-cols-2">
        <label class="block">
          <span class="font-medium text-gray-700">Nama Produk</span>
          <input type="text" name="name" value="{{ request.form.name or '' }}" class="mt-2 w-full rounded-3xl border border-orange-200 bg-orange-50 px-4 py-3 text-sm text-gray-900 focus:border-orange-400 focus:outline-none" required />
        </label>
        <label class="block">
          <span class="font-medium text-gray-700">Kategori</span>
          <select name="category_id" class="mt-2 w-full rounded-3xl border border-orange-200 bg-orange-50 px-4 py-3 text-sm text-gray-900 focus:border-orange-400 focus:outline-none" required>
            <option value="">Pilih kategori</option>
            {% for category in categories %}
            <option value="{{ category.id }}" {% if request.form.category_id == category.id|string %}selected{% endif %}>{{ category.name }}</option>
            {% endfor %}
          </select>
        </label>
        <label class="block md:col-span-2">
          <span class="font-medium text-gray-700">Deskripsi</span>
          <textarea name="description" rows="4" class="mt-2 w-full rounded-3xl border border-orange-200 bg-orange-50 px-4 py-3 text-sm text-gray-900 focus:border-orange-400 focus:outline-none">{{ request.form.description or '' }}</textarea>
        </label>
        <label class="block">
          <span class="font-medium text-gray-700">Harga (Rp)</span>
          <input type="number" min="0" name="price" value="{{ request.form.price or '' }}" class="mt-2 w-full rounded-3xl border border-orange-200 bg-orange-50 px-4 py-3 text-sm text-gray-900 focus:border-orange-400 focus:outline-none" required />
        </label>
        <label class="block">
          <span class="font-medium text-gray-700">Stok</span>
          <input type="number" min="0" name="stock" value="{{ request.form.stock or '' }}" class="mt-2 w-full rounded-3xl border border-orange-200 bg-orange-50 px-4 py-3 text-sm text-gray-900 focus:border-orange-400 focus:outline-none" required />
        </label>
        <label class="block md:col-span-2">
          <span class="font-medium text-gray-700">Gambar Produk</span>
          <input type="file" name="image" accept="image/png,image/jpeg" class="mt-2 w-full text-sm text-gray-600" required />
          <p class="mt-2 text-xs text-gray-500">Hanya JPG dan PNG yang diperbolehkan. Ukuran maksimal sesuai konfigurasi server.</p>
        </label>
      </div>

      <div class="flex items-center justify-end gap-3 pt-4 border-t border-orange-100">
        <a href="{{ url_for('admin.product_list') }}" class="rounded-full border border-orange-200 px-5 py-3 text-sm font-semibold text-gray-700 hover:bg-orange-50 transition">Batal</a>
        <button type="submit" class="rounded-full bg-orange-600 px-6 py-3 text-sm font-semibold text-white hover:bg-orange-700 transition">Simpan Produk</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
