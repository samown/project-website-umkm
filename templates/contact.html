{% extends "base.html" %}

{% block content %}
<section class="flex justify-center">
    <div class="w-full max-w-3xl bg-white rounded-3xl shadow-sm border border-gray-100 p-8 md:p-12 text-center">
        <p class="text-sm font-semibold uppercase tracking-[0.25em] text-indigo-600">Contact</p>
        <h1 class="mt-3 text-4xl font-black text-gray-900">Talk to TOKO RINI</h1>
        <p class="mt-5 text-gray-600 leading-8 max-w-2xl mx-auto">
            We are available during the hours below. For fast questions, order follow-up, or location help, message us on WhatsApp.
        </p>

        <div class="mt-8 space-y-3 text-left max-w-xl mx-auto">
            <div class="flex items-center justify-between rounded-2xl bg-gray-50 px-5 py-4">
                <span class="text-gray-600 font-medium">Monday - Friday</span>
                <span class="font-semibold text-gray-900">08:00 - 17:00</span>
            </div>
            <div class="flex items-center justify-between rounded-2xl bg-gray-50 px-5 py-4">
                <span class="text-gray-600 font-medium">Saturday</span>
                <span class="font-semibold text-gray-900">08:00 - 14:00</span>
            </div>
            <div class="flex items-center justify-between rounded-2xl bg-gray-50 px-5 py-4">
                <span class="text-gray-600 font-medium">Sunday</span>
                <span class="font-semibold text-gray-900">Closed</span>
            </div>
        </div>

        <a
            href="https://wa.me/6281234567890?text=Hello%20TOKO%20RINI%2C%20I%20would%20like%20to%20ask%20about%20your%20store."
            target="_blank"
            rel="noopener noreferrer"
            class="inline-flex mt-8 items-center justify-center rounded-xl bg-green-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-green-700"
        >
            Chat on WhatsApp
        </a>
    </div>
</section>
{% endblock %}
