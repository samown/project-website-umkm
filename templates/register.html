{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="max-w-md w-full bg-white p-8 border border-gray-100 rounded-xl shadow-lg">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900">Create Account</h2>
            <p class="mt-2 text-sm text-gray-600">Register as a new system user</p>
        </div>
        
        <form method="POST" action="{{ url_for('register') }}" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Username</label>
                <input class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors" id="username" type="text" name="username" placeholder="john_doe" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
                <input class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors" id="password" type="password" name="password" placeholder="••••••••" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="role">Role Authorization</label>
                <div class="relative">
                    <select class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 appearance-none bg-white transition-colors" id="role" name="role" required>
                        <option value="Admin">Admin</option>
                        <option value="Manager">Manager</option>
                        <option value="Staff">Warehouse Staff</option>
                    </select>
                </div>
            </div>
            
            <div class="pt-2">
                <button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors" type="submit">
                    Register Account
                </button>
            </div>
        </form>
        
        <p class="mt-6 text-center text-sm text-gray-600">
            Already have an account? <a href="{{ url_for('login') }}" class="text-indigo-600 hover:text-indigo-800 font-semibold transition-colors">Sign in directly</a>
        </p>
    </div>
</div>
{% endblock %}
