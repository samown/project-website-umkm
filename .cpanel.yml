---
deployment:
  tasks:
    # Copy public-facing files into public_html
    - export DEPLOYPATH=$HOME/public_html
    - /bin/cp -r public/. $DEPLOYPATH

    # src/ and database/ live inside public_html/ alongside index.php
    # Remove first so re-deployments do a clean replace (cp -r nests if dest exists)
    - /bin/rm -rf $DEPLOYPATH/src && /bin/cp -r src $DEPLOYPATH/src
    - /bin/rm -rf $DEPLOYPATH/database && /bin/cp -r database $DEPLOYPATH/database

    # Copy .env into public_html if it doesn't already exist
    - "[ -f $DEPLOYPATH/.env ] || /bin/cp .env.example $DEPLOYPATH/.env"

    # Ensure the images upload directory exists and is writable
    - /bin/mkdir -p $DEPLOYPATH/images
    - /bin/chmod 755 $DEPLOYPATH/images

    # Fix permissions on PHP files
    - /bin/find $DEPLOYPATH -name "*.php" -exec /bin/chmod 644 {} \;
