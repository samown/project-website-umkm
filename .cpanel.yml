---
deployment:
  tasks:
    # Copy all project files to the public_html directory
    - export DEPLOYPATH=$HOME/public_html
    - /bin/cp -r public/. $DEPLOYPATH
    - /bin/cp -r src $DEPLOYPATH/src
    - /bin/cp -r database $DEPLOYPATH/database

    # Copy .env if it doesn't already exist (preserve existing credentials)
    - "[ -f $DEPLOYPATH/.env ] || /bin/cp $HOME/project-website-umkm/.env.example $DEPLOYPATH/.env"

    # Ensure the images upload directory exists and is writable
    - /bin/mkdir -p $DEPLOYPATH/images
    - /bin/chmod 755 $DEPLOYPATH/images

    # Fix permissions on PHP files
    - /bin/find $DEPLOYPATH -name "*.php" -exec /bin/chmod 644 {} \;
