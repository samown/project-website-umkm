---
deployment:
  tasks:
    # 1. Define target path (Replace 'example' with your actual cPanel username)
    - export DEPLOYPATH=/home/example/public_html
    
    # 2. Synchronize your repository files to the deployment directory
    # Exclusion prevents copying the raw .git directory and local virtual environments
    - /usr/bin/rsync -avz --exclude '.git' --exclude 'venv' ./ $DEPLOYPATH/
    
    # 3. Set up Python virtual environment and install dependencies
    # (Update python3 path if cPanel uses a specific version like /opt/cpanel/ea-python39/bin/python)
    - cd $DEPLOYPATH && /usr/bin/env python3 -m venv venv
    - cd $DEPLOYPATH && . venv/bin/activate && python -m pip install --upgrade pip
    - cd $DEPLOYPATH && . venv/bin/activate && pip install -r requirements.txt
    
    # 4. Create the Passenger WSGI entrypoint file
    - |
      cat > $DEPLOYPATH/passenger_wsgi.py << 'EOF'
      import sys
      import os
      sys.path.insert(0, os.path.dirname(__file__))
      from app import create_app
      application = create_app()
      EOF
      
    # 5. Tell Phusion Passenger to restart the Python application
    - mkdir -p $DEPLOYPATH/tmp
    - touch $DEPLOYPATH/tmp/restart.txt
    - echo "Deployment finished successfully at $(date)"
