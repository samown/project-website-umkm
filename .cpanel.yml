---
deployment:
  tasks:
    # 1. Define the production path where this repository is deployed
    - export DEPLOYPATH=$HOME/project-website-umkm
    
    # 2. Sync the repository while preserving the server-side .env file
    - mkdir -p $DEPLOYPATH
    - /usr/bin/rsync -avz --exclude '.git' --exclude '.env' ./ $DEPLOYPATH/
    
    # 3. Move to the directory and run your docker compose command
    - cd $DEPLOYPATH && docker compose up --build -d
    
    - echo "Docker Compose deployment completed at $(date)"
