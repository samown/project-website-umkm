services:
  mysql:
    image: mysql:8.0
    container_name: toko-rini-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: toko_rini
      MYSQL_USER: toko_rini
      MYSQL_PASSWORD: toko_rini_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro

volumes:
  mysql_data: